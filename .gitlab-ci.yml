stages:
  - restore
  - build
  - test
  - chaos

variables:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""

default:
  image: mcr.microsoft.com/dotnet/sdk:9.0
  services:
    - docker:27-dind
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends docker.io curl jq

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .nuget/packages

restore:
  stage: restore
  script:
    - dotnet restore Volkswagen.Dashboard.WebApi.sln

build:
  stage: build
  script:
    - dotnet build Volkswagen.Dashboard.WebApi.sln --configuration Release --no-restore

test:
  stage: test
  script:
    - dotnet test Volkswagen.Dashboard.Tests/Volkswagen.Dashboard.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"
  artifacts:
    when: always
    paths:
      - Volkswagen.Dashboard.Tests/TestResults/
    expire_in: 7 days

chaos_engineering:
  stage: chaos
  allow_failure: true
  script:
    - docker run -d --name mongo-chaos -p 27017:27017 mongo:7
    - export MongoDb__ConnectionString="mongodb://localhost:27017"
    - export MongoDb__DatabaseName="volksdb_chaos"
    - dotnet run --project Volkswagen.Dashboard.WebApi/Volkswagen.Dashboard.WebApi.csproj --urls "http://0.0.0.0:8080" > api.log 2>&1 &
    - |
      for i in $(seq 1 40); do
        if curl -s -o /tmp/graphql.json -w "%{http_code}" -X POST http://localhost:8080/graphql \
          -H "Content-Type: application/json" \
          -d '{"query":"{ cars { id name } }"}' | grep -q "200"; then
          break
        fi
        sleep 2
      done
    - docker pause mongo-chaos
    - sleep 10
    - docker unpause mongo-chaos
    - |
      for i in $(seq 1 30); do
        STATUS=$(curl -s -o /tmp/graphql-after-chaos.json -w "%{http_code}" -X POST http://localhost:8080/graphql \
          -H "Content-Type: application/json" \
          -d '{"query":"{ cars { id name } }"}')
        if [ "$STATUS" = "200" ]; then
          echo "Recuperacao apos caos validada."
          exit 0
        fi
        sleep 2
      done
      echo "API nao recuperou apos experimento de caos."
      cat api.log
      exit 1
