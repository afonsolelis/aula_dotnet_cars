name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Volkswagen.Dashboard.WebApi.sln

      - name: Build
        run: dotnet build Volkswagen.Dashboard.WebApi.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Volkswagen.Dashboard.Tests/Volkswagen.Dashboard.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Volkswagen.Dashboard.Tests/TestResults/
          if-no-files-found: ignore

  chaos-engineering:
    name: Chaos Engineering (Testcontainers)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Volkswagen.Dashboard.WebApi.sln

      - name: Build
        run: dotnet build Volkswagen.Dashboard.WebApi.sln --configuration Release --no-restore

      - name: Run chaos tests with Testcontainers
        run: dotnet test Volkswagen.Dashboard.Tests/Volkswagen.Dashboard.Tests.csproj --configuration Release --no-build --filter "TestCategory=Chaos" --logger "trx;LogFileName=chaos-test-results.trx"

      - name: Upload chaos test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-results
          path: Volkswagen.Dashboard.Tests/TestResults/
          if-no-files-found: ignore
