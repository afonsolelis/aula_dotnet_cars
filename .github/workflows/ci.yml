name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Volkswagen.Dashboard.WebApi.sln

      - name: Build
        run: dotnet build Volkswagen.Dashboard.WebApi.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Volkswagen.Dashboard.Tests/Volkswagen.Dashboard.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Volkswagen.Dashboard.Tests/TestResults/
          if-no-files-found: ignore

  chaos-engineering:
    name: Chaos Engineering (${{ matrix.profile }})
    runs-on: ubuntu-latest
    needs: build-and-test
    if: matrix.run_on_pr || github.event_name != 'pull_request'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: smoke
            repetitions: 1
            run_on_pr: true
          - profile: stress
            repetitions: 3
            run_on_pr: false

    env:
      CHAOS_PROFILE: ${{ matrix.profile }}
      CHAOS_REPETITIONS: ${{ matrix.repetitions }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Volkswagen.Dashboard.WebApi.sln

      - name: Build
        run: dotnet build Volkswagen.Dashboard.WebApi.sln --configuration Release --no-restore

      - name: Docker diagnostics
        run: |
          docker version
          docker info

      - name: Run chaos tests (iterative)
        shell: bash
        run: |
          set -euo pipefail
          for run in $(seq 1 "$CHAOS_REPETITIONS"); do
            echo "Running chaos iteration $run/$CHAOS_REPETITIONS (profile=$CHAOS_PROFILE)"
            dotnet test Volkswagen.Dashboard.Tests/Volkswagen.Dashboard.Tests.csproj \
              --configuration Release \
              --no-build \
              --filter "TestCategory=Chaos" \
              --logger "trx;LogFileName=chaos-${CHAOS_PROFILE}-run-${run}.trx"
          done

      - name: Upload chaos test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-results-${{ matrix.profile }}
          path: Volkswagen.Dashboard.Tests/TestResults/
          if-no-files-found: ignore
